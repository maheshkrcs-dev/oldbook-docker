version: '3.8'

services:
  web:
    build: .
    container_name: my_web
    ports:
      - "8080:80"
    volumes:
      - ./website:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: my_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: my_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root123

volumes:
  db_data:
